name: Publish to Flathub

permissions:
  contents: read

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.4.14)'
        required: true

jobs:
  publish-flathub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine tag and version
        id: prep
        run: |
          tag="${{ inputs.tag || github.event.release.tag_name || github.ref_name }}"
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify FLATHUB_TOKEN secret is set
        run: |
          if [ -z "${{ secrets.FLATHUB_TOKEN }}" ]; then
            echo "FLATHUB_TOKEN secret is not set."
            echo "Add it at Settings → Secrets and variables → Actions after Flathub accepts the initial submission."
            exit 1
          fi
          echo "FLATHUB_TOKEN is configured."

      - name: Set up Python 3
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install flatpak-builder-tools
        run: |
          git clone --depth=1 https://github.com/flatpak/flatpak-builder-tools.git /tmp/flatpak-builder-tools
          pip install aiohttp toml tomlkit /tmp/flatpak-builder-tools/node

      - name: Generate cargo-sources.json
        run: |
          python3 /tmp/flatpak-builder-tools/cargo/flatpak-cargo-generator.py \
            src-tauri/Cargo.lock \
            -o flatpak/cargo-sources.json

      - name: Generate package-lock.json from bun.lock
        # flatpak-node-generator does not support Bun lock files directly.
        # We install from bun.lock to populate node_modules, then use npm to derive
        # a compatible package-lock.json (network call to resolve metadata only).
        run: |
          bun install --frozen-lockfile
          npm install --package-lock-only --ignore-scripts --legacy-peer-deps

      - name: Generate node-sources.json
        run: |
          flatpak-node-generator npm package-lock.json -o flatpak/node-sources.json

      - name: Get commit SHA for tag
        id: sha
        run: |
          # git rev-list dereferences annotated tags to their commit SHA.
          # Full clone (fetch-depth: 0 + fetch-tags: true) ensures all tags are present.
          commit=$(git rev-list -n 1 "${{ steps.prep.outputs.tag }}")
          if [ -z "$commit" ]; then
            echo "Could not resolve commit SHA for ${{ steps.prep.outputs.tag }}"
            exit 1
          fi
          echo "commit=$commit" >> "$GITHUB_OUTPUT"

      - name: Rewrite manifest for Flathub repo layout
        run: |
          commit="${{ steps.sha.outputs.commit }}"
          python3 - <<'PY'
from pathlib import Path
import re

manifest = Path("flatpak/io.github.fjrevoredo.mini-diarium.yml")
text = manifest.read_text()

remote_block = """      - type: git
        url: https://github.com/fjrevoredo/mini-diarium
        commit: __COMMIT__"""

text, dir_replacements = re.subn(
    r"(?m)^ {6}- type: dir\n(?: {8}#.*\n)* {8}path: \.\.$",
    remote_block,
    text,
    count=1,
)
if dir_replacements != 1:
    raise SystemExit("Expected exactly one local dir source block in flatpak manifest")

text, lockfile_replacements = re.subn(
    r"(?m)^ {8}path: \.\./package-lock\.json$",
    "        path: package-lock.json",
    text,
    count=1,
)
if lockfile_replacements != 1:
    raise SystemExit("Expected exactly one ../package-lock.json path in flatpak manifest")

if "--features custom-protocol" not in text:
    raise SystemExit("Flatpak manifest is missing the Tauri custom-protocol release build flag")

manifest.write_text(text.replace("__COMMIT__", commit))
PY
          # In this repo the manifest lives under flatpak/ and references ../package-lock.json.
          # In the Flathub repo the manifest is copied to the repo root beside package-lock.json.

      - name: Prepend release entry to metainfo.xml
        run: |
          version="${{ steps.prep.outputs.version }}"
          date="$(date -u +%Y-%m-%d)"
          release_entry="    <release version=\"${version}\" date=\"${date}\">\n      <url type=\"details\">https://github.com/fjrevoredo/mini-diarium/releases/tag/v${version}</url>\n    </release>"
          sed -i "s|  <!-- Automation prepends a new <release> entry here on each publish via flathub-publish.yml -->|  <!-- Automation prepends a new <release> entry here on each publish via flathub-publish.yml -->\n${release_entry}|" flatpak/io.github.fjrevoredo.mini-diarium.metainfo.xml

      - name: Clone Flathub repository
        env:
          FLATHUB_TOKEN: ${{ secrets.FLATHUB_TOKEN }}
        run: |
          git clone \
            "https://x-access-token:${FLATHUB_TOKEN}@github.com/flathub/io.github.fjrevoredo.mini-diarium.git" \
            /tmp/flathub-repo

      - name: Copy files into Flathub repo
        run: |
          cp flatpak/io.github.fjrevoredo.mini-diarium.yml         /tmp/flathub-repo/io.github.fjrevoredo.mini-diarium.yml
          cp flatpak/io.github.fjrevoredo.mini-diarium.metainfo.xml /tmp/flathub-repo/io.github.fjrevoredo.mini-diarium.metainfo.xml
          cp flatpak/io.github.fjrevoredo.mini-diarium.desktop      /tmp/flathub-repo/io.github.fjrevoredo.mini-diarium.desktop
          cp flatpak/cargo-sources.json           /tmp/flathub-repo/cargo-sources.json
          cp flatpak/node-sources.json            /tmp/flathub-repo/node-sources.json
          cp package-lock.json                   /tmp/flathub-repo/package-lock.json

      - name: Commit and open PR against Flathub repo
        env:
          FLATHUB_TOKEN: ${{ secrets.FLATHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.FLATHUB_TOKEN }}
        run: |
          tag="${{ steps.prep.outputs.tag }}"
          version="${{ steps.prep.outputs.version }}"
          branch="update-${version}"

          cd /tmp/flathub-repo

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$branch"
          git add .
          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "Update to ${version}"
          git push --force-with-lease origin "HEAD:${branch}"

          gh pr create \
            --repo "flathub/io.github.fjrevoredo.mini-diarium" \
            --base master \
            --head "$branch" \
            --title "Update to ${version}" \
            --body "Automated update from https://github.com/fjrevoredo/mini-diarium/releases/tag/${tag}" \
          || echo "PR may already exist; check https://github.com/flathub/io.github.fjrevoredo.mini-diarium/pulls"
