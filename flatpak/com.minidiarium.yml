app-id: com.minidiarium
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20
command: mini-diarium

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # The journal directory is user-configurable via change_diary_directory and can be set to any
  # path on the filesystem. Restricting to xdg-documents would silently break multi-journal setups
  # and any existing journal location configured by the user.
  - --filesystem=home

modules:
  - name: mini-diarium
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node20/bin
      env:
        CARGO_HOME: /run/build/mini-diarium/cargo
        npm_config_cache: /run/build/mini-diarium/npm-cache
    build-commands:
      # 1. Install pre-vendored node deps (offline, sourced from node-sources.json)
      - npm ci --offline
      # 2. Build frontend → dist/   (package.json "build" script = "vite build")
      - npm run build
      # 3. Build Rust binary — Tauri's build.rs (tauri_build::build()) reads tauri.conf.json,
      #    finds frontendDist "../dist", and embeds it at compile time.
      #    We use bare cargo, NOT the Tauri CLI, because the CLI would re-run
      #    beforeBuildCommand ("bun run build") which would fail — Bun is not in the sandbox.
      - cargo build --release --manifest-path src-tauri/Cargo.toml
      # 4. Install files
      - install -Dm755 src-tauri/target/release/mini-diarium /app/bin/mini-diarium
      - install -Dm644 flatpak/com.minidiarium.desktop /app/share/applications/com.minidiarium.desktop
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/com.minidiarium.png
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/com.minidiarium.png
      - install -Dm644 src-tauri/icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/com.minidiarium.png
      - install -Dm644 flatpak/com.minidiarium.metainfo.xml /app/share/metainfo/com.minidiarium.metainfo.xml
    sources:
      - type: git
        url: https://github.com/fjrevoredo/mini-diarium
        tag: vX.Y.Z
        commit: PLACEHOLDER_COMMIT_SHA
      - node-sources.json
      - cargo-sources.json
